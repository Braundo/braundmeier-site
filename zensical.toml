[project]
site_name = "Aaron Braundmeier"
site_url = "https://www.braundmeier.com"
site_description = "Aaron Braundmeier's personal portfolio"
site_author = "Aaron Braundmeier"
nav = [
  {"About Me" = "index.md"},
  {"Certificates" = "certs.md"},
  {"Contact" = "contact.md"}
]
extra_css = ["stylesheets/extra.css"]
extra_javascript = ["javascripts/extra.js", "javascripts/adsense.js"]

[project.theme]
name = "zensical"
custom_dir = "overrides"
favicon = "images/favicon.svg"
font.text = "Ubuntu"
font.code = "Fira Code"
features = [
  "palette.toggle",
  "navigation.tabs",
  "content.tooltips",
  "content.code.copy",
  "content.code.select"
]

[project.theme.icon]
logo = "material/ab-testing"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
accent = "green"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
accent = "green"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.extra]
generator = false

[project.extra.analytics]
provider = "google"
property = "G-WF0BEBS62L"

[project.markdown_extensions."pymdownx.highlight"]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions."pymdownx.emoji"]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"

[project.markdown_extensions."pymdownx.superfences"]

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.abbr]

[project.markdown_extensions.def_list]
